name: Steam Sale Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # รันทุก 6 ชั่วโมง (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # กดรันมือได้จาก Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python bot.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Save notified list
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add notified.json
          git diff --staged --quiet || git commit -m "chore: update notified list"
          git push
